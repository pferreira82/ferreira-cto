<g transform="translate(50,50)">

  <circle r="34" stroke="#C8A96E" stroke-width="0.5" fill="none" opacity="0.17"/>
  <circle r="24" stroke="#C8A96E" stroke-width="0.35" fill="none" opacity="0.10"/>
